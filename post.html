<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oguz Sahin | Post</title>
    <meta name="description" content="Read post by Oguz Sahin">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <canvas id="starfield"></canvas>

    <div class="layout">
        <header class="header">
            <nav class="nav">
                <a href="/" class="nav-brand" style="display: flex; align-items: center; gap: 8px;">
                    <img src="darth-vader.svg" alt="Darth Vader Logo"
                        style="width: 24px; height: 24px; object-fit: contain; filter: invert(1);">
                    Oguz Sahin
                </a>
                <div class="nav-links">
                    <a href="/about.html" class="nav-link lightsaber-hover">About</a>
                    <a href="/" class="nav-link lightsaber-hover active">Posts</a>
                </div>
            </nav>
        </header>

        <main class="main-content">
            <article id="post-content" class="post-article">
                <div class="loading">Summoning the Jedi Archives...</div>
                <!-- Post content will be injected here via JavaScript -->
            </article>
            <div class="back-link-container">
                <a href="/" class="nav-link lightsaber-hover">← Back to Posts</a>
            </div>
        </main>

        <footer class="footer">
            <p>© 2026 Oguz Sahin. May the Force be with you.</p>
        </footer>
    </div>

    <script src="js/app.js"></script>
    <script>
        // Specific logic for single post page
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const slug = urlParams.get('slug');
            if (slug) {
                fetchPost(slug);
            } else {
                document.getElementById('post-content').innerHTML = '<h2>Post not found</h2>';
            }
        });
    </script>
</body>

</html>
